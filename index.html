<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mainsurf invite</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="title">mainsurf • invite system</div>

  <div id="question" class="question">
    Ты устала?
  </div>

  <div id="photos" class="photos hidden">
    <img loading="lazy" src="images/photo1.jpg">
    <img loading="lazy" src="images/photo2.jpg">
    <img loading="lazy" src="images/photo3.jpg">
    <img loading="lazy" src="images/photo4.jpg">
    <img loading="lazy" src="images/photo5.jpg">
  </div>

  <div id="buttons" class="buttons">

    <button class="btn danger" onclick="answer('yes')">
      я устала
    </button>

    <button class="btn good" onclick="answer('no')">
      всё хорошо
    </button>

  </div>

  <div id="msg" class="msg"></div>

</div>

<script>
let step = 1;

const q = document.getElementById("question");
const btn = document.getElementById("buttons");
const msg = document.getElementById("msg");
const photos = document.getElementById("photos");

function answer(type){

// ❗ ВОПРОС 1
if(step === 1){

  if(type === "yes"){
    q.innerText = "тогда просто отдохни. не надо себя заставлять.";
    msg.innerText = "💤";
    btn.innerHTML = "";
    return; // стоп сценарий
  }

  step++;
  q.innerText = "может пойдем в Discord?";
  msg.innerText = "";
  return;
}

// ❗ ВОПРОС 2
if(step === 2){

  if(type === "yes"){
    msg.innerText = "открываю Discord...";
    window.open("https://discord.com/channels/@me", "_blank");
    return;
  }

  // НЕА
  q.innerText = "ну ладна";
  msg.innerText = "";

  btn.innerHTML = `
    <button class="btn good" onclick="window.open('https://rainymood.com/', '_blank')">
      ладна
    </button>
  `;

  return;
}

}
</script>

</body>
</html>
