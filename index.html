<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>invite</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="gallery">
  <img src="images/photo1.jpg">
  <img src="images/photo2.jpg">
  <img src="images/photo3.jpg">
  <img src="images/photo4.jpg">
  <img src="images/photo5.jpg">
</div>

<div class="card">

  <div class="title">invite system</div>

  <div id="question" class="question">Ты устала?</div>

  <div id="buttons" class="buttons">

    <button class="btn danger" onclick="answer('yes')">да</button>
    <button class="btn good" onclick="answer('no')">нет</button>

  </div>

  <div id="msg" class="msg"></div>

</div>

<script>
let step = 1;
let locked = false;

const q = document.getElementById("question");
const btn = document.getElementById("buttons");
const msg = document.getElementById("msg");

function stop(){
  btn.innerHTML = "";
  locked = true;
}

function answer(type){
  if(locked) return;

  // 1
  if(step === 1){

    if(type === "yes"){
      q.innerText = "закрой сайт и отдохни";
      msg.innerText = "💤";
      stop();
      return;
    }

    step++;
    q.innerText = "как настроение?";

    btn.innerHTML = `
      <button class="btn good" onclick="answer('good')">все хорошо</button>
      <button class="btn danger" onclick="answer('bad')">плохо</button>
    `;
    return;
  }

  // 2
  if(step === 2){

    if(type === "bad"){
      q.innerText = "надеюсь станет лучше";
      msg.innerText = "💙";
      stop();
      return;
    }

    step++;
    q.innerText = "пойдём в Discord?";

    btn.innerHTML = `
      <button class="btn good" onclick="answer('yes')">да</button>
      <button class="btn danger" onclick="answer('no')">нет</button>
    `;
    return;
  }

  // 3
  if(step === 3){

    if(type === "yes"){
      window.open("https://t.me/ffweld?text=пойдем!", "_blank");
      return;
    }

    q.innerText = "ну ладнааа";
    msg.innerText = "🌧";

    btn.innerHTML = `
      <button class="btn good" onclick="window.open('https://rainymood.com/', '_blank')">
        ок
      </button>
    `;

    stop();
    return;
  }
}
</script>

</body>
</html>
