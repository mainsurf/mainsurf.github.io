<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiryuha</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<!-- 📸 2 СЛОТА ФОТО -->
<div class="photos">
  <img id="imgA" src="images/photo1.jpg">
  <img id="imgB" src="images/photo2.jpg">
</div>

<div class="card">

  <div class="title">Кирюша спрашивает:</div>

  <div id="question" class="question">Ты устала?</div>

  <div id="buttons" class="buttons">

    <button class="btn danger" onclick="answer('yes')">да</button>
    <button class="btn good" onclick="answer('no')">нет</button>

  </div>

  <div id="msg" class="msg"></div>

</div>

<script>
let step = 1;
let locked = false;

const q = document.getElementById("question");
const btn = document.getElementById("buttons");
const msg = document.getElementById("msg");

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

const photos = [
  "images/photo1.jpg",
  "images/photo2.jpg",
  "images/photo3.jpg",
  "images/photo4.jpg",
  "images/photo5.jpg"
];

let index = 2;
let toggle = false;

/* 🔁 плавная смена фото */
function swapPhotos(){
  index = (index + 1) % photos.length;

  const next = photos[index];

  if(toggle){
    imgA.src = next;
  } else {
    imgB.src = next;
  }

  toggle = !toggle;
}

setInterval(swapPhotos, 3500);

function answer(type){
  if(locked) return;

  if(step === 1){

    if(type === "yes"){
      q.innerText = "закрой сайт и отдохни";
      msg.innerText = "💤";
      locked = true;
      return;
    }

    step++;
    q.innerText = "как настроение?";

    btn.innerHTML = `
      <button class="btn good" onclick="answer('good')">все хорошо</button>
      <button class="btn danger" onclick="answer('bad')">плохо</button>
    `;
    return;
  }

  if(step === 2){

    if(type === "bad"){
      q.innerText = "надеюсь станет лучше";
      msg.innerText = "💙";
      locked = true;
      return;
    }

    step++;
    q.innerText = "пойдём в Discord?";

    btn.innerHTML = `
      <button class="btn good" onclick="answer('yes')">да</button>
      <button class="btn danger" onclick="answer('no')">нет</button>
    `;
    return;
  }

  if(step === 3){

    if(type === "yes"){
      window.open("https://t.me/ffweld?text=пойдем!", "_blank");
      return;
    }

    q.innerText = "ну ладнааа";
    msg.innerText = "🌧";

    btn.innerHTML = `
      <button class="btn good" onclick="window.open('https://rainymood.com/', '_blank')">
        ок
      </button>
    `;

    locked = true;
    return;
  }
}
</script>

</body>
</html>
