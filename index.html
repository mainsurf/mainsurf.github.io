<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mainsurf invite</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="title">mainsurf • invite system</div>

  <div id="question" class="question">Ты устала?</div>

  <div id="buttons" class="buttons">

    <button class="btn danger" onclick="answer('yes')">да</button>
    <button class="btn good" onclick="answer('no')">нет</button>

  </div>

  <div id="msg" class="msg"></div>

</div>

<script>
let step = 1;
let locked = false;

const q = document.getElementById("question");
const btn = document.getElementById("buttons");
const msg = document.getElementById("msg");

function block(){
  btn.innerHTML = "";
  locked = true;
}

function answer(type){
  if(locked) return;

  // 🔴 ВОПРОС 1
  if(step === 1){

    if(type === "yes"){
      q.innerText = "закрой сайт и отдохни.";
      msg.innerText = "💤";
      block();
      return;
    }

    step++;
    q.innerText = "как настроение?";
    return;
  }

  // 🔵 ВОПРОС 2
  if(step === 2){

    if(type === "no"){
      q.innerText = "надеюсь оно станет лучше";
      msg.innerText = "💙";
      block();
      return;
    }

    step++;
    q.innerText = "пойдём в Discord?";
    msg.innerText = "";
    return;
  }

  // 🟢 ВОПРОС 3
  if(step === 3){

    if(type === "yes"){
      window.open("https://discord.com/channels/@me", "_blank");
      return;
    }

    q.innerText = "ну ладна";
    msg.innerText = "🌧";

    btn.innerHTML = `
      <button class="btn good" onclick="window.open('https://rainymood.com/', '_blank')">
        ладна
      </button>
    `;

    block();
    return;
  }
}
</script>

</body>
</html>
