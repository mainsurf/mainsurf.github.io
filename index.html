<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mainsurf invite</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="title">mainsurf • invite system</div>

  <div id="question" class="question">
    Ты устала?
  </div>

  <div id="photos" class="photos hidden">
    <img src="images/photo1.jpg">
    <img src="images/photo2.jpg">
    <img src="images/photo3.jpg">
    <img src="images/photo4.jpg">
    <img src="images/photo5.jpg">
  </div>

  <div id="buttons" class="buttons">

    <button class="btn danger" onclick="answer('yes')">
      я устала
    </button>

    <button class="btn good" onclick="answer('no')">
      всё хорошо
    </button>

  </div>

  <div id="msg" class="msg"></div>

</div>

<script>
let step = 1;

const q = document.getElementById("question");
const btn = document.getElementById("buttons");
const msg = document.getElementById("msg");
const photos = document.getElementById("photos");

function answer(type){

// ❗ первый вопрос
if(step === 1){

if(type === "yes"){
msg.innerText = "закрой сайт и отдохни.";
// но НЕ блокируем кнопки (как ты хотел)
step++;
return;
}

step++;
q.innerText = "Хочешь ли ты немного прогуляться перед фильмом?";
return;
}

if(step === 2){
step++;
q.innerText = "Любишь ли ты уютные вечера?";
return;
}

if(step === 3){
step++;
q.innerText = "Плед, чай и фильм — звучит хорошо?";
return;
}

if(step === 4){
step++;
q.innerText = "Можно я тебя позову смотреть фильм?";
return;
}

if(step === 5){

q.innerText = "готово.";

photos.classList.remove("hidden");

btn.innerHTML = `
<a href="https://t.me/ffweld?text=%D0%BE%D0%BA%D0%B5">
<button class="btn good">перейти в тг</button>
</a>
`;

msg.innerText = "я уже всё подготовил.";
}
}
</script>

</body>
</html>
