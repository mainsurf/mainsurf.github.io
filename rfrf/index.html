<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>пхпхп, я удалил)</title>

<style>
:root{
    --bg:#050505;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at 20% 20%, rgba(255,77,109,0.08), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,0,120,0.06), transparent 50%),
                #050505;
    color:#ffffff;
    overflow:hidden;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
}

.noise{
    position:fixed;
    inset:0;
    background-image:radial-gradient(#ffffff10 1px,transparent 1px);
    background-size:3px 3px;
    opacity:.05;
    pointer-events:none;
    z-index:1;
}

.cursor-glow{
    position:fixed;
    width:450px;
    height:450px;
    border-radius:50%;
    pointer-events:none;
    z-index:0;
    transform:translate(-50%, -50%);
    background:radial-gradient(circle,
        rgba(255, 0, 120, 0.35) 0%,
        rgba(255, 0, 120, 0.12) 40%,
        transparent 70%);
    filter:blur(25px);
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.main-text{
    position:relative;
    z-index:2;
    font-size:clamp(2.5rem, 8vw, 6rem);
    font-weight:700;
    letter-spacing:-0.03em;
    text-align:center;
    transition: transform .15s ease;
    text-shadow: 0 0 60px rgba(255,77,109,0.2);
    line-height:1.2;
}

.main-text em{
    color:#ff4d6d;
    font-style:normal;
}

@media (max-width:600px){
    .main-text{
        font-size:clamp(2rem, 10vw, 3.5rem);
    }
}
</style>
</head>

<body>

<div class="noise"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<canvas id="particles"></canvas>

<div class="main-text" id="mainText">пхпхп, <em>я удалил)</em></div>

<script>
const glow = document.getElementById("cursorGlow");
document.addEventListener("mousemove", (e) => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

const mainText = document.getElementById("mainText");
document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.clientX) * 0.02;
    const y = (window.innerHeight / 2 - e.clientY) * 0.02;
    mainText.style.transform = `translate(${x}px, ${y}px) scale(1.02)`;
});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const mouse = { x: null, y: null };

window.addEventListener("mousemove", e => {
    mouse.x = e.x;
    mouse.y = e.y;
});

class Particle {
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 1;
        this.speedY = (Math.random() - 0.5) * 1;
    }

    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        if(mouse.x && mouse.y){
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 120){
                this.x -= dx * 0.02;
                this.y -= dy * 0.02;
            }
        }

        if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }

    draw(){
        ctx.fillStyle = "rgba(255,77,109,0.6)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init(){
    for(let i=0;i<80;i++){
        particles.push(new Particle());
    }
}
init();

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
